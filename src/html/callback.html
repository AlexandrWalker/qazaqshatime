<!DOCTYPE html>
<html lang="ru" class="main-page">
@@include('blocks/head.html', {"title": "Qazaqshatime"})

<body>
  <div class="wrapper">
    <!-- Шапка -->
    @@include('./blocks/header-login.html')
    <main class="main">

      <section class="callback">
        <div class="container">
          <div class="callback__inner">

            <div class="general__head">
              <div class="general__title">
                <h1>
                  Обратная связь
                </h1>
              </div>
            </div>

            <div class="callback__body">

              <form class="form" action="">
                <div class="form-content">
                  <div class="form-body form-col-2">
                    <div class="form-group">
                      <label class="form-label">
                        Имя
                        <input class="form-input" name="name" type="text">
                      </label>
                    </div>
                    <div class="form-group">
                      <label class="form-label">
                        Email
                        <input class="form-input" name="email" type="email">
                      </label>
                    </div>
                    <div class="form-group">
                      <label class="form-label">
                        Сообщение
                        <textarea class="form-textarea" name="message" rows="5"></textarea>
                      </label>
                    </div>
                  </div>
                  <div class="form-foot">
                    <button class="btn btn--green" data-fancybox href="#popup-success">
                      Отправить
                    </button>
                  </div>
                </div>
              </form>

            </div>

            <div class="callback__cover">
              <img src="./../images/temp/callback-cover.png" alt="">
            </div>

          </div>
        </div>
      </section>

    </main>
    <!-- Подвал -->
    @@include('blocks/footer.html')
