<div id="popup-2" class="popup">
  <div class="popup__wrap" data-lenis-prevent>
    <div class="popup__content">
      <div class="popup__head">
        <div class="popup__title">
          Бесплатная консультация
        </div>
      </div>
      <div class="popup__body">
        <form class="form-inner" action="#">
          <div class="form-body">

            <div class="form-block">
              <div class="form-title">
                Ваши данные
              </div>
              <div class="form-content">
                <div class="form-group">
                  <div class="form-icon">
                    <i class="icon-person"></i>
                  </div>
                  <input class="form-input" type="text" name="popup_consultation_name" placeholder="Имя">
                </div>
                <div class="form-group">
                  <div class="form-icon">
                    <i class="icon-phone"></i>
                  </div>
                  <input class="form-input" type="tel" name="popup_consultation_tel" placeholder="Телефон">
                </div>
              </div>
            </div>

          </div>
          <div class="form-foot">
            <button class="btn form-btn" data-fancybox data-close-existing="true" href="#popup-3">
              <span class="btn-text">
                Отправить
              </span>
            </button>
            <div class="form-privacy">
              <div class="form-group">
                <label class="form-checkbox-label">
                  <input class="form-checkbox-input" name="popup_consultation_privacy" type="checkbox">
                  <span class="form-checkbox-item"></span>
                  <span class="form-checkbox-text">
                    Я согласен на обработку персональных данных
                  </span>
                </label>
              </div>
              <div class="form-group">
                <label class="form-checkbox-label">
                  <input class="form-checkbox-input" name="popup_consultation_ads" type="checkbox">
                  <span class="form-checkbox-item"></span>
                  <span class="form-checkbox-text">
                    Я согласен на рекламные уведомления
                  </span>
                </label>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

        </div>

        <a class="btn" href="/SibMer">
          <span class="btn-text">
            На главную
          </span>
        </a>
      </div>
    </div>
  </div>
</div>
