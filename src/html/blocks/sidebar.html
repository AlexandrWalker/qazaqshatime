<div class="sidebar">
  <div class="sidebar__inner">

    <div class="progress">
      <div class="progress__head">
        <div class="progress__title">
          Ваш прогресс
        </div>
        <div class="progress__cover">
          <img src="./../../images/temp/sidebar-progress-img.png" alt="">
        </div>
        <div class="progress__text">
          Кубки сегодня: <span>8/16</span>
        </div>
      </div>
      <div class="progress__bar">
        <div class="progress__bar-item">
          <div class="progress__bar-head">
            <div class="progress__bar-text">
              Змейка
            </div>
            <div class="progress__bar-count">
              <span>5/7</span>
              <i class="icon-galochka"></i>
            </div>
          </div>
          <div class="progress__bar-body">
            <progress value="5" max="7"></progress>
          </div>
        </div>
        <div class="progress__bar-item progress__bar-item--full">
          <div class="progress__bar-head">
            <div class="progress__bar-text">
              Тренажеры
            </div>
            <div class="progress__bar-count">
              <span>3/3</span>
              <i class="icon-galochka"></i>
            </div>
          </div>
          <div class="progress__bar-body">
            <progress value="3" max="3"></progress>
          </div>
        </div>
        <div class="progress__bar-item">
          <div class="progress__bar-head">
            <div class="progress__bar-text">
              Сценки
            </div>
            <div class="progress__bar-count">
              <span>3/7</span>
              <i class="icon-galochka"></i>
            </div>
          </div>
          <div class="progress__bar-body">
            <progress value="3" max="7"></progress>
          </div>
        </div>
      </div>
      <div class="progress__active">
        <div class="progress__active-head">
          <div class="progress__active-title">
            Недельная активность
          </div>
        </div>
        <div class="progress__active-body">

          <div class="progress__active-grid">

            <!-- Пн -->
            <div class="progress__active-col">
              <div class="progress__active-wrap">
                <progress max="10" value="4"></progress>
              </div>
              <span class="progress__active-label">пн</span>
            </div>

            <!-- Вт -->
            <div class="progress__active-col">
              <div class="progress__active-wrap">
                <progress max="10" value="8"></progress>
              </div>
              <span class="progress__active-label">вт</span>
            </div>

            <!-- Ср -->
            <div class="progress__active-col">
              <div class="progress__active-wrap">
                <progress max="10" value="4"></progress>
              </div>
              <span class="progress__active-label">ср</span>
            </div>

            <!-- Чт -->
            <div class="progress__active-col">
              <div class="progress__active-wrap">
                <progress max="10" value="7"></progress>
              </div>
              <span class="progress__active-label">чт</span>
            </div>

            <!-- Пт -->
            <div class="progress__active-col">
              <div class="progress__active-wrap">
                <progress max="10" value="10"></progress>
              </div>
              <span class="progress__active-label">пт</span>
            </div>

            <!-- Сб -->
            <div class="progress__active-col">
              <div class="progress__active-wrap empty">
                <progress max="10" value="0"></progress>
              </div>
              <span class="progress__active-label">сб</span>
            </div>

            <!-- Вс -->
            <div class="progress__active-col">
              <div class="progress__active-wrap empty">
                <progress max="10" value="0"></progress>
              </div>
              <span class="progress__active-label">вс</span>
            </div>

          </div>

        </div>
        <div class="progress__active-foot">
          <i class="icon-flame"></i>
          5 дней подряд
        </div>
      </div>
    </div>

    <div class="achievs">
      <div class="achievs__head">
        <div class="achievs__title">
          Достижения
        </div>
        <div class="achievs__cover">
          <img src="./../../images/temp/achievs-cover.png" alt="">
        </div>
      </div>
      <div class="achievs__bar">
        <div class="achievs__bar-item">
          <div class="achievs__bar-head">
            <div class="achievs__bar-text">
              Первый рубеж
            </div>
            <div class="achievs__bar-count">
              <span>4/15</span>
            </div>
          </div>
          <div class="achievs__bar-body">
            <progress value="4" max="15"></progress>
          </div>
        </div>
      </div>
      <a class="achievs__btn btn" href="/">
        Смотреть все
      </a>
    </div>

    <div class="repl">
      <div class="repl__cover">
        <img src="./../../images/temp/repl-cover.png" alt="">
      </div>
      <div class="repl__title">
        Хотите продолжить?
      </div>
      <div class="repl__text">
        Пополните баланс, чтобы продолжить занятия
      </div>
      <div class="repl__btn btn btn--green">
        Пополнить
      </div>
    </div>

  </div>
</div>
