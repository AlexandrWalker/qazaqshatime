<!DOCTYPE html>
<html lang="ru" class="main-page">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0 maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#142637">
  <!-- noindex -->
  <meta name="robots" content="noindex, nofollow" />
  <!-- format -->
  <meta name="format-detection" content="telephone=no" />
  <meta name="format-detection" content="date=no">
  <meta name="format-detection" content="address=no">
  <meta name="format-detection" content="email=no">
  <!-- favicon -->
  <!-- title -->
  <title>Qazaqshatime</title>
  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
  <!-- icons -->
  <!-- <link rel="stylesheet" href="./icons/style.css"> -->
  <!-- styles -->
  <link rel="stylesheet" href="./libs/fancybox/fancybox.css">
  <link rel="stylesheet" href="./libs/swiper/swiper-bundle.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <div class="wrapper">
    <!-- Шапка -->
    <header id="header" class="header header-login">
  <div class="container">
    <div class="header__inner">

      <div class="header__left">
        <a class="logo" href="/qazaqshatime">
          <img src="./images/logo/logo.svg" alt="">
        </a>
      </div>
      <div class="header__right">
        <div class="header__items">
          <div class="header__item">
            3 из 6
          </div>
          <div class="header__item">
            23
          </div>
          <div class="header__profile">
            Профиль
          </div>
        </div>
      </div>

    </div>
  </div>
</header>
    <main class="main">

      <section class="callback">
        <div class="container">
          <div class="callback__inner">

            <div class="general__head">
              <div class="general__title">
                <h1>
                  Обратная связь
                </h1>
              </div>
            </div>

            <div class="callback__body">

              <form class="form" action="">
                <div class="form-content">
                  <div class="form-body form-col-2">
                    <div class="form-group">
                      <label class="form-label">
                        Имя
                        <input class="form-input" name="name" type="text">
                      </label>
                    </div>
                    <div class="form-group">
                      <label class="form-label">
                        Email
                        <input class="form-input" name="email" type="email">
                      </label>
                    </div>
                    <div class="form-group">
                      <label class="form-label">
                        Сообщение
                        <textarea class="form-textarea" name="message" rows="5"></textarea>
                      </label>
                    </div>
                  </div>
                  <div class="form-foot">
                    <button class="btn btn--green" data-fancybox href="#popup-success">
                      Отправить
                    </button>
                  </div>
                </div>
              </form>

            </div>

            <div class="callback__cover">
              <img src="./images/temp/callback-cover.png" alt="">
            </div>

          </div>
        </div>
      </section>

    </main>
    <!-- Подвал -->
    <footer class="footer">
  <div class="container">
    <div class="footer__inner">

      <div class="footer__nav">
        <ul>
          <li>
            <a href="/qazaqshatime/about.html">
              О нас
            </a>
          </li>
          <li>
            <a href="/qazaqshatime/help.html">
              Помощь
            </a>
          </li>
          <li>
            <a href="/qazaqshatime/callback.html">
              Обратная связь
            </a>
          </li>
          <li>
            <a href="/qazaqshatime">
              Условия и конфиденциальность
            </a>
          </li>
        </ul>
      </div>

    </div>
  </div>
</footer>
<!-- Попапы -->
<div id="popup-begin" class="popup">
  <div class="popup__wrap">

    <div class="popup__content">
      <div class="popup__head">
        <div class="popup__title">
          Выберите уровень
        </div>
      </div>
      <div class="popup__body">
        <div class="popup__items">
          <a class="popup__item" href="/qazaqshatime">
            <div class="popup__item-img">
              <img src="./images/temp/popup-begin-img-1.png" alt="">
            </div>
            <div class="popup__item-title">
              Вы совсем <br>
              новичок?
            </div>
            <div class="popup__item-text">
              <p>
                Начнем с азов
              </p>
            </div>
          </a>
          <a class="popup__item" href="/qazaqshatime">
            <div class="popup__item-img">
              <img src="./images/temp/popup-begin-img-2.png" alt="">
            </div>
            <div class="popup__item-title">
              Уже немного <br>
              знаете казахский?
            </div>
            <div class="popup__item-text">
              <p>
                Начнем с азов
              </p>
            </div>
          </a>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="popup-success" class="popup">
  <div class="popup__wrap">

    <div class="popup__content">
      <div class="popup__cover">
        <img src="./images/temp/galochka.png" alt="">
      </div>
      <div class="popup__head">
        <div class="popup__title">
          Ваше сообщение отправлено!
        </div>
      </div>
      <div class="popup__body">
        <button class="btn btn--green">
          На главную
        </button>
      </div>
    </div>

  </div>
</div>
</div>
<!-- libs -->
<!-- jquery -->
<script src="./libs/jquery/jquery.v3.7.1.min.js"></script>
<!-- fancybox -->
<script src="./libs/fancybox/fancybox.umd.js"></script>
<!-- swiper -->
<script src="./libs/swiper/swiper-bundle.min.js"></script>
<!-- scripts -->
<script src="./js/main.js"></script>
</body>

</html>
